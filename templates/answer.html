{% extends "base.html" %}
{% block title %}Antwort-Bewertung - M259 Study{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto animate-fade-in">
    <div class="flex items-center gap-3 mb-8">
        <div class="icon-container w-10 h-10 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-white">Antwort-Bewertung</h1>
    </div>
    
    <div class="grid lg:grid-cols-2 gap-6">
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-lg font-semibold text-white mb-4">Frage generieren oder eigene eingeben</h2>
            <form id="questionForm" class="mb-4">
                <select name="topic" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition mb-3">
                    <option value="AI ML Grundlagen">AI & ML Grundlagen</option>
                    <option value="ML Kategorien">ML Kategorien</option>
                    <option value="Datenschutz">Datenschutz & DSG</option>
                    <option value="Bias Fairness">Bias & Fairness</option>
                    <option value="EDA">EDA & Datenanalyse</option>
                    <option value="ML Algorithmen">ML Algorithmen</option>
                    <option value="LLM Grundlagen">LLM Grundlagen</option>
                    <option value="Prompt Engineering">Prompt Engineering</option>
                    <option value="RAG">RAG & Vector DBs</option>
                </select>
                <button type="submit" class="w-full bg-surface-700/50 hover:bg-surface-700 text-white py-3 px-4 rounded-xl transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Frage generieren
                </button>
            </form>
            
            <form id="answerForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Frage</label>
                    <textarea id="questionText" name="question" rows="3" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition" required></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Deine Antwort</label>
                    <textarea name="user_answer" rows="6" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition" placeholder="Schreibe deine Antwort hier..." required></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Kontext (optional)</label>
                    <input type="text" name="context" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition" placeholder="Zusätzlicher Kontext...">
                </div>
                <button type="submit" class="w-full btn-primary text-white font-medium py-3 px-4 rounded-xl transition">
                    Antwort bewerten
                </button>
            </form>
        </div>
        
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-lg font-semibold text-white mb-4">Bewertung</h2>
            <div id="judgmentContainer" class="text-gray-400">
                <div class="flex flex-col items-center justify-center h-64 text-center">
                    <svg class="w-16 h-16 text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                    <p>Generiere eine Frage oder gib eine eigene ein, schreibe deine Antwort und lass sie bewerten.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('questionForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    showLoading(btn);
    
    const formData = new FormData(e.target);
    const response = await fetch('/api/question', { method: 'POST', body: formData });
    const data = await response.json();
    
    document.getElementById('questionText').value = data.question;
    resetBtn(btn, 'Frage generieren');
});

document.getElementById('answerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    showLoading(btn);
    
    const formData = new FormData(e.target);
    const response = await fetch('/api/judge', { method: 'POST', body: formData });
    const data = await response.json();
    const j = data.judgment;
    
    const scoreColor = j.score >= 80 ? 'from-green-400 to-emerald-500' : j.score >= 50 ? 'from-yellow-400 to-amber-500' : 'from-red-400 to-rose-500';
    const scoreBg = j.score >= 80 ? 'bg-green-500/10 border-green-500/30' : j.score >= 50 ? 'bg-yellow-500/10 border-yellow-500/30' : 'bg-red-500/10 border-red-500/30';
    const correctnessText = j.correctness === 'correct' ? 'Richtig' : j.correctness === 'partially_correct' ? 'Teilweise richtig' : 'Falsch';
    
    document.getElementById('judgmentContainer').innerHTML = `
        <div class="text-center mb-6">
            <div class="text-6xl font-bold bg-gradient-to-r ${scoreColor} bg-clip-text text-transparent mb-2">${j.score || 0}%</div>
            <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium ${scoreBg} border">${correctnessText}</span>
        </div>
        <div class="space-y-4">
            <div class="p-4 bg-surface-800/50 rounded-xl border border-slate-700/50">
                <h3 class="font-semibold text-primary-400 mb-2 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
                    </svg>
                    Feedback
                </h3>
                <p class="text-gray-300">${j.feedback || ''}</p>
            </div>
            ${j.improvement_tips ? `
            <div class="p-4 bg-surface-800/50 rounded-xl border border-slate-700/50">
                <h3 class="font-semibold text-primary-400 mb-2 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    Verbesserungstipps
                </h3>
                <ul class="space-y-2">
                    ${j.improvement_tips.map(t => `<li class="flex items-start gap-2 text-gray-300"><svg class="w-4 h-4 text-primary-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>${t}</li>`).join('')}
                </ul>
            </div>
            ` : ''}
            ${j.model_answer ? `
            <div class="p-4 bg-primary-500/10 rounded-xl border border-primary-500/30">
                <h3 class="font-semibold text-primary-400 mb-2 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Musterantwort
                </h3>
                <p class="text-gray-300">${j.model_answer}</p>
            </div>
            ` : ''}
        </div>
    `;
    resetBtn(btn, 'Antwort bewerten');
});
</script>
{% endblock %}
