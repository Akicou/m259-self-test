{% extends "base.html" %}
{% block title %}Prüfung - M259 Study{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto animate-fade-in">
    <div class="flex items-center gap-3 mb-8">
        <div class="icon-container w-10 h-10 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-white">Prüfung Generator</h1>
    </div>
    
    <div class="glass-card rounded-2xl p-6 mb-6">
        <form id="examForm">
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">Thema</label>
                <select name="topic" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition">
                    <option value="Alle Themen Tag 1-3">Alle Themen (Komplette Prüfung)</option>
                    <option value="Tag 1 Grundlagen">Tag 1: Grundlagen & Ethik</option>
                    <option value="Tag 2 EDA ML">Tag 2: EDA & ML Algorithmen</option>
                    <option value="Tag 3 LLMs">Tag 3: LLMs & Prompt Engineering</option>
                    <option value="AI ML Grundlagen">AI & ML Grundlagen</option>
                    <option value="Datenschutz Ethik">Datenschutz & Ethik</option>
                    <option value="EDA Datenanalyse">EDA & Datenanalyse</option>
                    <option value="ML Algorithmen">ML Algorithmen</option>
                    <option value="LLM Prompting">LLMs & Prompting</option>
                </select>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Anzahl Fragen</label>
                    <input type="number" name="question_count" value="5" min="1" max="15" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Schwierigkeit</label>
                    <select name="difficulty" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition">
                        <option value="easy">Einfach</option>
                        <option value="medium" selected>Mittel</option>
                        <option value="hard">Schwer</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Fragentypen</label>
                    <select name="question_types" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition">
                        <option value="multiple_choice,open">Gemischt</option>
                        <option value="multiple_choice">Nur Multiple Choice</option>
                        <option value="open">Nur Offene Fragen</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full btn-primary text-white font-medium py-3 px-4 rounded-xl">
                Prüfung Generieren
            </button>
        </form>
    </div>
    
    <div id="examContainer" class="hidden">
        <div class="glass-card rounded-2xl p-6 mb-6">
            <h2 id="examTitle" class="text-2xl font-bold text-white mb-6"></h2>
            <div id="questionsContainer"></div>
            <button id="submitBtn" onclick="submitExam()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-medium py-3 px-4 rounded-xl transition mt-4">
                Prüfung Abgeben & Bewerten
            </button>
        </div>
        
        <div class="glass-card rounded-2xl p-6 hidden" id="resultsContainer">
            <h3 class="text-xl font-bold text-white mb-4">Ergebnisse</h3>
            <div id="resultsContent"></div>
        </div>
    </div>
</div>

<script>
let exam = null;
let openAnswersRatings = {};

document.getElementById('examForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    showLoading(btn);
    
    const formData = new FormData(e.target);
    const response = await fetch('/api/exam', { method: 'POST', body: formData });
    const data = await response.json();
    
    exam = data.exam;
    openAnswersRatings = {};
    renderExam();
    document.getElementById('examContainer').classList.remove('hidden');
    document.getElementById('resultsContainer').classList.add('hidden');
    resetBtn(btn, 'Prüfung Generieren');
});

function renderExam() {
    document.getElementById('examTitle').textContent = exam.title;
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    
    exam.questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'mb-6 p-5 bg-surface-800/50 rounded-xl border border-slate-700/50';
        div.id = `question-${i}`;
        
        if (q.type === 'multiple_choice') {
            div.innerHTML = `
                <div class="flex items-start gap-3 mb-4">
                    <span class="flex-shrink-0 w-7 h-7 rounded-lg bg-primary-500/20 text-primary-400 text-sm font-bold flex items-center justify-center">${i + 1}</span>
                    <div>
                        <p class="font-medium text-white">${q.question}</p>
                        <span class="text-gray-500 text-sm">${q.points} Punkte</span>
                    </div>
                </div>
                <div class="space-y-2 ml-10" id="options-${i}">
                    ${q.options.map((opt, j) => `
                        <label class="flex items-center gap-3 cursor-pointer p-3 rounded-lg border border-slate-700/50 hover:border-primary-500/50 hover:bg-surface-800/30 transition">
                            <input type="radio" name="q${i}" value="${String.fromCharCode(65 + j)}" class="w-4 h-4 text-primary-500 bg-surface-800 border-slate-600 focus:ring-primary-500">
                            <span class="option-text text-gray-300">${String.fromCharCode(65 + j)}. ${opt}</span>
                        </label>
                    `).join('')}
                </div>
                <div id="feedback-${i}" class="mt-3 ml-10 hidden"></div>
            `;
        } else {
            div.innerHTML = `
                <div class="flex items-start gap-3 mb-4">
                    <span class="flex-shrink-0 w-7 h-7 rounded-lg bg-accent-500/20 text-accent-400 text-sm font-bold flex items-center justify-center">${i + 1}</span>
                    <div>
                        <p class="font-medium text-white">${q.question}</p>
                        <span class="text-gray-500 text-sm">${q.points} Punkte</span>
                    </div>
                </div>
                <textarea id="answer-${i}" name="q${i}" rows="4" class="w-full ml-10 bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition" placeholder="Deine Antwort..."></textarea>
                <div id="feedback-${i}" class="mt-3 ml-10 hidden"></div>
            `;
        }
        container.appendChild(div);
    });
}

async function submitExam() {
    const btn = document.getElementById('submitBtn');
    showLoading(btn);
    
    let mcCorrect = 0;
    let mcTotal = 0;
    let mcResults = [];
    let openPromises = [];
    
    // Process MC questions
    exam.questions.forEach((q, i) => {
        if (q.type === 'multiple_choice') {
            mcTotal += q.points;
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const selectedVal = selected ? selected.value : null;
            const isCorrect = selectedVal === q.correct;
            
            if (isCorrect) {
                mcCorrect += q.points;
            }
            
            mcResults.push({
                index: i,
                question: q.question,
                selected: selectedVal,
                correct: q.correct,
                options: q.options,
                isCorrect: isCorrect,
                points: q.points
            });
        }
    });
    
    // Show MC results immediately
    mcResults.forEach(result => {
        const feedbackDiv = document.getElementById(`feedback-${result.index}`);
        const optionsContainer = document.getElementById(`options-${result.index}`);
        
        // Highlight all options
        optionsContainer.querySelectorAll('label').forEach((label, j) => {
            const letter = String.fromCharCode(65 + j);
            label.classList.remove('border-slate-700/50', 'border-green-500', 'border-red-500', 'bg-green-500/10', 'bg-red-500/10');
            
            if (letter === result.correct) {
                label.classList.add('border-green-500', 'bg-green-500/10');
            } else if (letter === result.selected && !result.isCorrect) {
                label.classList.add('border-red-500', 'bg-red-500/10');
            }
        });
        
        // Show feedback
        feedbackDiv.classList.remove('hidden');
        if (result.isCorrect) {
            feedbackDiv.innerHTML = `<div class="flex items-center gap-2 p-3 bg-green-500/10 border border-green-500/30 rounded-lg text-green-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                Richtig! +${result.points} Punkte
            </div>`;
        } else {
            const selectedText = result.selected ? `${result.selected} (${result.options[result.selected.charCodeAt(0) - 65]})` : 'Keine Antwort';
            feedbackDiv.innerHTML = `<div class="p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400">
                <div class="flex items-center gap-2 mb-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    Falsch!
                </div>
                <p class="text-sm">Deine Antwort: ${selectedText}</p>
                <p class="text-sm text-green-400">Richtige Antwort: ${result.correct} (${result.options[result.correct.charCodeAt(0) - 65]})</p>
            </div>`;
        }
    });
    
    // Process open questions with AI rating
    exam.questions.forEach((q, i) => {
        if (q.type === 'open') {
            const answer = document.getElementById(`answer-${i}`).value;
            if (answer.trim()) {
                openPromises.push(
                    fetch('/api/rate-open-answer', {
                        method: 'POST',
                        body: new URLSearchParams({
                            question: q.question,
                            user_answer: answer,
                            max_points: q.points
                        })
                    }).then(r => r.json()).then(rating => {
                        openAnswersRatings[i] = rating;
                        return { index: i, rating: rating, question: q, answer: answer };
                    })
                );
            } else {
                openAnswersRatings[i] = { points: 0, max_points: q.points, percentage: 0, feedback: 'Keine Antwort gegeben' };
            }
        }
    });
    
    // Wait for all AI ratings
    const openResults = await Promise.all(openPromises);
    
    // Show open question results
    openResults.forEach(result => {
        const feedbackDiv = document.getElementById(`feedback-${result.index}`);
        const r = result.rating;
        
        feedbackDiv.classList.remove('hidden');
        const scoreColor = r.percentage >= 80 ? 'text-green-400' : r.percentage >= 50 ? 'text-yellow-400' : 'text-red-400';
        const bgColor = r.percentage >= 80 ? 'bg-green-500/10 border-green-500/30' : r.percentage >= 50 ? 'bg-yellow-500/10 border-yellow-500/30' : 'bg-red-500/10 border-red-500/30';
        
        feedbackDiv.innerHTML = `<div class="p-4 ${bgColor} border rounded-xl">
            <div class="flex justify-between items-center mb-2">
                <span class="font-semibold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                    KI-Bewertung
                </span>
                <span class="${scoreColor} font-bold text-lg">${r.points}/${r.max_points} Punkte (${r.percentage}%)</span>
            </div>
            <p class="text-gray-300 mb-3">${r.feedback}</p>
            ${r.key_points_covered && r.key_points_covered.length > 0 ? `
                <div class="flex items-start gap-2 text-sm text-green-400 mb-2">
                    <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    <span>Erwähnte Punkte: ${r.key_points_covered.join(', ')}</span>
                </div>
            ` : ''}
            ${r.key_points_missed && r.key_points_missed.length > 0 ? `
                <div class="flex items-start gap-2 text-sm text-red-400">
                    <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    <span>Fehlende Punkte: ${r.key_points_missed.join(', ')}</span>
                </div>
            ` : ''}
        </div>`;
    });
    
    // Calculate total
    let openTotal = 0;
    let openMax = 0;
    Object.values(openAnswersRatings).forEach(r => {
        openTotal += r.points || 0;
        openMax += r.max_points || 0;
    });
    
    const totalPoints = mcCorrect + openTotal;
    const maxPoints = mcTotal + openMax;
    const percentage = Math.round((totalPoints / maxPoints) * 100);
    
    // Show final results
    document.getElementById('resultsContainer').classList.remove('hidden');
    const gradeColor = percentage >= 80 ? 'from-green-400 to-emerald-500' : percentage >= 60 ? 'from-yellow-400 to-amber-500' : 'from-red-400 to-rose-500';
    
    document.getElementById('resultsContent').innerHTML = `
        <div class="text-center mb-6">
            <div class="text-5xl font-bold bg-gradient-to-r ${gradeColor} bg-clip-text text-transparent mb-2">${totalPoints}/${maxPoints}</div>
            <div class="text-2xl bg-gradient-to-r ${gradeColor} bg-clip-text text-transparent">${percentage}%</div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-surface-800/50 rounded-xl border border-slate-700/50">
                <div class="text-gray-400 text-sm mb-1">Multiple Choice</div>
                <div class="text-xl font-bold text-white">${mcCorrect}/${mcTotal}</div>
            </div>
            <div class="p-4 bg-surface-800/50 rounded-xl border border-slate-700/50">
                <div class="text-gray-400 text-sm mb-1">Offene Fragen</div>
                <div class="text-xl font-bold text-white">${openTotal}/${openMax}</div>
            </div>
        </div>
    `;
    
    resetBtn(btn, 'Prüfung Abgeben & Bewerten');
    
    // Scroll to results
    document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth' });
}
</script>
{% endblock %}
