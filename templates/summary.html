{% extends "base.html" %}
{% block title %}Zusammenfassung - M259 Study{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto animate-fade-in">
    <div class="flex items-center gap-3 mb-8">
        <div class="icon-container w-10 h-10 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-white">Zusammenfassung</h1>
    </div>
    
    <div class="glass-card rounded-2xl p-6 mb-6">
        <form id="summaryForm">
            <div class="grid md:grid-cols-2 gap-4 mb-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Thema</label>
                    <select name="topic" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition">
                        <option value="Kompletter Kurs M259">Kompletter Kurs (Alle Tage)</option>
                        <option value="Tag 1 AI ML Grundlagen Ethik">Tag 1: Grundlagen & Ethik</option>
                        <option value="Tag 2 EDA ML Projekt">Tag 2: EDA & ML Projekt</option>
                        <option value="Tag 3 LLMs Prompting">Tag 3: LLMs & Prompting</option>
                        <option value="AI vs ML Unterschied">AI vs ML Unterschied</option>
                        <option value="ML Kategorien Supervised Unsupervised Reinforcement">ML Kategorien</option>
                        <option value="Datenschutz DSG Schweiz">Datenschutz (DSG)</option>
                        <option value="Algorithmic Bias Fairness">Bias & Fairness</option>
                        <option value="ML Projektphasen CRISP-DM">ML Projektphasen</option>
                        <option value="EDA explorative Datenanalyse">EDA</option>
                        <option value="Datenbereinigung Ausreisser">Datenbereinigung</option>
                        <option value="Klassifikation Regression Entscheidungsbäume">Klassifikation & Regression</option>
                        <option value="LLM Grundlagen Tokenisierung">LLM Grundlagen</option>
                        <option value="Prompt Engineering Techniken">Prompt Engineering</option>
                        <option value="RAG Retrieval Augmented Generation">RAG</option>
                        <option value="N8N Workflow Automatisierung">N8N Workflows</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Stil</label>
                    <select name="style" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition">
                        <option value="detailed">Detailliert</option>
                        <option value="bullet">Bullet Points</option>
                        <option value="exam">Prüfungsrelevant</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full btn-primary text-white font-medium py-3 px-4 rounded-xl transition">
                Zusammenfassung erstellen
            </button>
        </form>
    </div>
    
    <div id="summaryContainer" class="hidden glass-card rounded-2xl p-6">
        <div id="summaryContent" class="prose prose-invert max-w-none text-gray-300 leading-relaxed"></div>
    </div>
</div>

<script>
document.getElementById('summaryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    showLoading(btn);
    
    const formData = new FormData(e.target);
    const response = await fetch('/api/summary', { method: 'POST', body: formData });
    const data = await response.json();
    
    const container = document.getElementById('summaryContainer');
    container.classList.remove('hidden');
    
    // Format the summary with proper styling
    let formatted = data.summary
        .replace(/\n/g, '<br>')
        .replace(/^### (.*$)/gm, '<h4 class="text-lg font-semibold text-primary-400 mt-4 mb-2">$1</h4>')
        .replace(/^## (.*$)/gm, '<h3 class="text-xl font-semibold text-white mt-6 mb-3">$1</h3>')
        .replace(/^# (.*$)/gm, '<h2 class="text-2xl font-bold text-white mt-6 mb-4">$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^- (.*$)/gm, '<li class="ml-4 mb-1">$1</li>');
    
    document.getElementById('summaryContent').innerHTML = formatted;
    resetBtn(btn, 'Zusammenfassung erstellen');
});
</script>
{% endblock %}
