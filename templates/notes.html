{% extends "base.html" %}
{% block title %}Lernnotizen - M259 Study{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto animate-fade-in">
    <div class="flex items-center gap-3 mb-8">
        <div class="icon-container w-10 h-10 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-white">Lernnotizen</h1>
    </div>
    
    <div class="glass-card rounded-2xl p-6 mb-6">
        <form id="notesForm">
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">Thema</label>
                <select name="topic" class="w-full bg-surface-800/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 transition">
                    <option value="AI ML Grundlagen">AI & ML Grundlagen</option>
                    <option value="ML Kategorien Supervised Unsupervised Reinforcement">ML Kategorien</option>
                    <option value="Datenschutz DSG Personendaten">Datenschutz (DSG)</option>
                    <option value="Algorithmic Bias Historic Representation Measurement">Algorithmic Bias</option>
                    <option value="Fairness Demographic Parity Equalized Odds">Fairness-Definitionen</option>
                    <option value="Bias Reduzierung Pre In Post Processing">Bias-Reduzierung</option>
                    <option value="ML Projektphasen CRISP-DM MLOps">ML Projektphasen</option>
                    <option value="EDA statistische Kennzahlen Visualisierung">EDA & Kennzahlen</option>
                    <option value="Datenbereinigung NULL Duplikate Ausreisser IQR">Datenbereinigung</option>
                    <option value="Klassifikation Regression Entscheidungsbäume Lineare Regression">ML Algorithmen</option>
                    <option value="Train Test Validation Split">Train-Test-Split</option>
                    <option value="LLM Transformer Tokenisierung">LLM Grundlagen</option>
                    <option value="Prompt Engineering Few-Shot Chain-of-Thought">Prompt Engineering</option>
                    <option value="RAG Vector Database Similarity Search">RAG & Vector DBs</option>
                    <option value="Function Calling Tool Use">Function Calling</option>
                    <option value="N8N Workflow Automatisierung Nodes">N8N Workflows</option>
                    <option value="LLM Limitationen Halluzinationen">LLM Limitationen</option>
                </select>
            </div>
            <button type="submit" class="w-full btn-primary text-white font-medium py-3 px-4 rounded-xl transition">
                Notizen generieren
            </button>
        </form>
    </div>
    
    <div id="notesContainer" class="hidden glass-card rounded-2xl p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Notizen
            </h2>
            <button onclick="copyNotes()" class="text-sm bg-surface-800/50 hover:bg-surface-700/50 px-4 py-2 rounded-xl transition flex items-center gap-2 text-gray-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                <span id="copyBtnText">Kopieren</span>
            </button>
        </div>
        <div id="notesContent" class="prose prose-invert max-w-none whitespace-pre-wrap text-gray-300 leading-relaxed"></div>
    </div>
</div>

<script>
let notesText = '';

document.getElementById('notesForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    showLoading(btn);
    
    const formData = new FormData(e.target);
    const response = await fetch('/api/notes', { method: 'POST', body: formData });
    const data = await response.json();
    
    notesText = data.notes;
    document.getElementById('notesContainer').classList.remove('hidden');
    document.getElementById('notesContent').textContent = notesText;
    resetBtn(btn, 'Notizen generieren');
});

function copyNotes() {
    navigator.clipboard.writeText(notesText);
    const btn = document.getElementById('copyBtnText');
    btn.textContent = 'Kopiert!';
    setTimeout(() => btn.textContent = 'Kopieren', 2000);
}
</script>
{% endblock %}
